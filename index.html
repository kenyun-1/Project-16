<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz project</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
      <header class="header"><h3>QuizMaster</h3></header>
      <section class="quiz-card">
        <h1>Coding Quiz</h1>
        <p id="question-number">Question 1/5</p>
        <h2 id="question-text">What does HTML stand for?</h2>
    <div class="answers-container">
      <button class="answer-btn">Hyper Text Markup Language</button>
      <button class="answer-btn">Home Tool Markup Language</button>
      <button class="answer-btn">Hyperlink Markup Language</button>
      <button class="answer-btn">Hyper Text Markdown Language</button>
    </div>
        <div class="btn-container">
        <button id="submit-btn">Submit</button>
        </div>
        <p id="score-text">Score: 0</p>
      </section>
      <button id="reset-btn">Restart Quiz</button>
    <script src="script.js"></script>
  </body>
</html>
